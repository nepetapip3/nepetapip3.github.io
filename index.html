<!DOCTYPE html>
<html lang="ru">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Google Sans', system-ui, sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f0f0f;
color:white;
padding: 16px;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(24px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card{
background:#1e1e1e;
padding:60px;
border-radius:45px;
width:360px;
max-width: 100%;
box-shadow:0 10px 30px rgba(0,0,0,0.6);

opacity: 0;
animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
}

.profile{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #333;
}

.nick{
font-size:26px;
font-weight:600;
}

.description{
color:#b0b0b0;
margin-bottom:25px;
font-size:14px;
}

.buttons{
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
text-decoration:none;
color:white;
padding:12px;
border-radius:16px;
background:#2a2a2a;
transition:0.2s;
text-align:center;
}

.btn:hover{
background:#3a3a3a;
transform:scale(1.03);
}

.profile a{
cursor: default;
}

@media (max-width: 420px) {
  .card {
    padding: 32px 24px;
    border-radius: 28px;
    width: 100%;
  }
  .nick {
    font-size: 22px;
  }
}
</style>

</head>

<body>

<div class="card">

<div class="profile">
    <a href="easteregg.jpg">
<img src="avatarka.jpg" class="avatar">
</a>
<div class="nick">nepetapip3</div>
</div>

<div class="description">
люблю вайбкодить всякое...<p>тг ботов, сайты, и всякие программки. так-же занимаюсь Arduino, и увлекаюсь прошивом телефонов
</div>

<div class="buttons">

</div>

</div>

</body>
</html>
