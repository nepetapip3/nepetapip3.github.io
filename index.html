<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nepetapip3.github.io</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&family=Google+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #121212;
      --surface:   #1e1e1e;
      --surface2:  #2c2c2c;
      --primary:   #ffffff;
      --primary-v: #3700b3;
      --on-primary:#000000;
      --on-bg:     #e1e1e1;
      --on-surface:#cfcfcf;
      --divider:   rgba(255,255,255,.12);
      --ripple:    rgba(187,134,252,.2);
      --elev1:     0 2px 4px rgba(0,0,0,.6);
      --elev2:     0 4px 8px rgba(0,0,0,.7);
      --elev3:     0 8px 24px rgba(0,0,0,.8);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--on-bg);
      font-family: 'Google Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Top App Bar ── */
    .app-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--surface);
      box-shadow: var(--elev1);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 10;
    }
    .app-bar-title {
      font-family: 'Google Sans Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--primary);
      letter-spacing: .05em;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--elev3);
      padding: 54px 46px 46px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .headline {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--on-bg);
      margin-bottom: 12px;
    }
    .subheadline {
      font-size: 16px;
      font-weight: 300;
      color: var(--on-surface);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--divider);
      margin: 0 -40px 32px;
    }

    /* ── Button grid ── */
    .btn-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    /* Material Contained Button */
    .md-btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--on-primary);
      font-family: 'Google Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      border-radius: 4px;
      padding: 0 24px;
      height: 48px;
      cursor: pointer;
      box-shadow: var(--elev1);
      transition: box-shadow .2s ease, background .2s ease;
      min-width: 140px;
      justify-content: center;
    }
    .md-btn:hover {
      background: #ce9ffc;
      box-shadow: var(--elev2);
    }
    .md-btn:active { box-shadow: none; }

    /* Ripple */
    .ripple-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,0,0,.25);
      transform: scale(0);
      animation: ripple .5s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── Footer ── */
    footer {
      margin-top: 48px;
      font-size: 12px;
      color: rgba(255,255,255,.3);
      letter-spacing: .04em;
    }
    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { padding: 16px; }

      .card {
        padding: 32px 24px 28px;
        border-radius: 16px;
      }

      .divider { margin: 0 -24px 24px; }

      .headline {
        font-size: 18px;
      }

      .subheadline {
        font-size: 14px;
        margin-bottom: 28px;
      }

      .btn-grid {
        flex-direction: column;
        gap: 12px;
      }

      .md-btn {
        width: 100%;
        min-width: unset;
        height: 52px;
        font-size: 15px;
      }

      footer { margin-top: 32px; }
    }
  </style>
</head>
<body>

  <div class="app-bar">
    <div style="display:flex; align-items:center; gap:10px">
  <span class="material-icons" style="font-size:18px">
    home
  </span>
  <span class="app-bar-title">nepetapip3.github.io</span>
  </div>
  </div>

  <div class="card">
    <h1 class="headline">Hey! It looks like you've landed on the homepage of nepetapip3.github.io.</h1>
    <p class="subheadline">You can choose where to go next by clicking the buttons below.</p>

    <div class="divider"></div>

    <div class="btn-grid">

        <a class="md-btn" href="nepetapip3.github.io/bio">
        <span class="material-icons" style="font-size:18px">person</span>
        Bio
      </a>

      <a class="md-btn" href="nepetapip3.github.io/minigames">
        <span class="material-icons" style="font-size:18px">sports_esports</span>
        Minigames
      </a>

      <a class="md-btn" href="nepetapip3.github.io/dvd-rat">
        <span class="material-icons" style="font-size:18px">album</span>
        DVD-Rat
      </a>

      <a class="md-btn" href="nepetapip3.github.io/gusenitsy">
        <span class="material-icons" style="font-size:18px">bug_report</span>
        GUSENITSY
      </a>


    </div>
  </div>

  <footer id="footer-text">nepetapip3 · github.io</footer>

  <script>
    // Ripple-эффект для всех кнопок
    document.querySelectorAll('.md-btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const circle = document.createElement('span');
        const rect   = this.getBoundingClientRect();
        const size   = Math.max(rect.width, rect.height);
        circle.className = 'ripple-circle';
        circle.style.cssText = `
          width:${size}px; height:${size}px;
          left:${e.clientX - rect.left - size/2}px;
          top:${e.clientY  - rect.top  - size/2}px;
        `;
        this.appendChild(circle);
        circle.addEventListener('animationend', () => circle.remove());
      });
    });
    const footerVariants = [
  "nepetapip3.lol?",
  "nepetacsv? who is this?",
  "nepetapip3",
  " sudo rm -rf --no-preserve-root /* ",
  "404 not found",
  "what is nekobrawl?",
  "i use cachyos btw :3",
  "does anyone actually read this?",
  "lol",
  "whoami"
];

document.getElementById('footer-text').textContent =
  footerVariants[Math.floor(Math.random() * footerVariants.length)];
  </script>
</body>
</html>
