<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="icon.jpg">
  <title>nepetapip3 · bio</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&family=Google+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #121212;
      --surface:   #1e1e1e;
      --surface2:  #2c2c2c;
      --primary:   #ffffff;
      --on-primary:#000000;
      --on-bg:     #e1e1e1;
      --on-surface:#cfcfcf;
      --divider:   rgba(255,255,255,.12);
      --elev1:     0 2px 4px rgba(0,0,0,.6);
      --elev2:     0 4px 8px rgba(0,0,0,.7);
      --elev3:     0 8px 24px rgba(0,0,0,.8);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--on-bg);
      font-family: 'Google Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--surface);
      box-shadow: var(--elev1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }

    .app-bar-title {
      font-family: 'Google Sans Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--primary);
      letter-spacing: .05em;
    }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 0 12px;
      height: 32px;
      cursor: pointer;
      color: var(--on-bg);
      font-family: 'Google Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .03em;
      transition: border-color .2s, background .2s;
    }
    .lang-btn:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.4);
    }

    .card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--elev3);
      padding: 54px 46px 46px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      justify-content: center;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,.15);
      flex-shrink: 0;
    }

    .nick {
      font-family: 'Google Sans Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--primary);
      letter-spacing: .04em;
      text-align: left;
    }

    .description {
      font-size: 15px;
      font-weight: 300;
      color: var(--on-surface);
      line-height: 1.65;
      margin-bottom: 32px;
      text-align: left;
    }

    .divider {
      height: 1px;
      background: var(--divider);
      margin: 0 -46px 32px;
    }

    .btn-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .md-btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--on-primary);
      font-family: 'Google Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      border-radius: 4px;
      padding: 0 24px;
      height: 48px;
      cursor: pointer;
      box-shadow: var(--elev1);
      transition: box-shadow .2s ease, background .2s ease;
      min-width: 130px;
      justify-content: center;
    }
    .md-btn:hover {
      background: #ce9ffc;
      box-shadow: var(--elev2);
    }
    .md-btn:active { box-shadow: none; }

    .ripple-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,0,0,.25);
      transform: scale(0);
      animation: ripple .5s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    footer {
      margin-top: 48px;
      font-size: 12px;
      color: rgba(255,255,255,.3);
      letter-spacing: .04em;
    }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .card {
        padding: 32px 24px 28px;
        border-radius: 16px;
      }
      .divider { margin: 0 -24px 24px; }
      .btn-grid {
        flex-direction: column;
        gap: 12px;
      }
      .md-btn {
        width: 100%;
        min-width: unset;
        height: 52px;
        font-size: 15px;
      }
      footer { margin-top: 32px; }
    }
  </style>
</head>
<body>

  <div class="app-bar">
    <div style="display:flex; align-items:center; gap:10px">
      <span class="material-icons" style="font-size:18px">person</span>
      <span class="app-bar-title">nepetapip3 · bio</span>
    </div>
    <button class="lang-btn" onclick="toggleLang()">
      <span class="material-icons" style="font-size:16px">translate</span>
      <span id="lang-label">RU</span>
    </button>
  </div>

  <div class="card">

    <div class="profile">
      <a href="easteregg.jpg">
        <img src="avatarka.jpg" class="avatar" alt="avatar">
      </a>
      <div class="nick">nepetapip3</div>
    </div>

    <p class="description" id="bio-desc">
      био уже не релевантно, я любитель, разрабатываю разные проекты для себя и все
    </p>

    <div class="divider"></div>

    <div class="btn-grid">
      <a class="md-btn" href="https://github.com/nepetapip3" target="_blank">
        <span class="material-icons" style="font-size:18px">code</span>
        <span>GitHub</span>
      </a>
      <a class="md-btn" href="https://t.me/nepetapip3" target="_blank">
        <span class="material-icons" style="font-size:18px">send</span>
        <span>Telegram</span>
      </a>
      <a class="md-btn" href="https://4pda.to/forum/index.php?showuser=12169012" target="_blank">
        <span class="material-icons" style="font-size:18px">forum</span>
        <span>4PDA</span>
      </a>
    </div>
  </div>

  <footer id="footer-text">nepetapip3 · bio</footer>

  <script>
    document.querySelectorAll('.md-btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const circle = document.createElement('span');
        const rect   = this.getBoundingClientRect();
        const size   = Math.max(rect.width, rect.height);
        circle.className = 'ripple-circle';
        circle.style.cssText = `
          width:${size}px; height:${size}px;
          left:${e.clientX - rect.left - size/2}px;
          top:${e.clientY  - rect.top  - size/2}px;
        `;
        this.appendChild(circle);
        circle.addEventListener('animationend', () => circle.remove());
      });
    });

    const footerVariants = [
      "nepetapip3.lol?",
      "nepetacsv? who is this?",
      "nepetapip3",
      " sudo rm -rf --no-preserve-root /* ",
      "404 not found",
      "what is nekobrawl?",
      "i use cachyos btw :3",
      "does anyone actually read this?",
      "lol",
      "whoami"
    ];
    document.getElementById('footer-text').textContent =
      footerVariants[Math.floor(Math.random() * footerVariants.length)];

    const translations = {
      ru: {
        desc: "био уже не релевантно, я любитель, разрабатываю разные проекты для себя и все",
        label: "RU"
      },
      en: {
        desc: "bio is no longer relevant, I'm an amateur, I develop different projects for myself and that's all",
        label: "EN"
      }
    };

    let currentLang = 'ru';

    function toggleLang() {
      currentLang = currentLang === 'ru' ? 'en' : 'ru';
      document.getElementById('lang-label').textContent = translations[currentLang].label;
      document.getElementById('bio-desc').textContent = translations[currentLang].desc;
    }
  </script>
</body>
</html>
